name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./hr-helper
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/hr-helper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./web-app
          push: true
          build-args: |
            VITE_API_URL=https://kekly.ru:443
            VITE_TG_URL=https://t.me/Human_resourse_bot?start=
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/web-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-bot:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Bot
        uses: docker/build-push-action@v7
        with:
          context: ./hr-bot
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/hr-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-frontend, build-bot]
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH commands on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.APP_REMOTE_PATH }}
            git pull origin main
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload
#            docker image prune -af
