services:
  hr-helper:
    container_name: hr-helper
    image: ghcr.io/dmitysh/hr-helper:latest
    env_file: hr-helper/prod.env
    restart: on-failure
    networks:
      - default

  web-app:
    container_name: web-app
    image: ghcr.io/dmitysh/web-app:latest
    restart: on-failure
    networks:
      - default

  hr-bot:
    container_name: hr-bot
    image: ghcr.io/dmitysh/hr-bot:latest
    env_file: hr-bot/.env
    restart: on-failure
    networks:
      - default

  tika:
    image: apache/tika:latest
    restart: on-failure
    networks:
      - default

  nginx:
    image: ghcr.io/max-lt/nginx-jwt-module:v3.4.3
    container_name: nginx-gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cifra.rule=Host(`kekly.ru`)"
      - "traefik.http.routers.cifra.entrypoints=websecure"
      - "traefik.http.routers.cifra.tls.certresolver=letsencrypt"
      - "traefik.http.services.cifra.loadbalancer.server.port=80"
      - "traefik.docker.network=web-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: on-failure
    networks:
      - default
      - web-gateway

networks:
  web-gateway:
    external: true
